appId: com.supertasks-app
productName: SuperTasks
copyright: Copyright © 2024

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/*.{md,ts,map}"
  - "!**/.git"

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: SuperTasks

portable:
  artifactName: "${productName}-Portable-${version}.${ext}"

linux:
  icon: resources/icon.png
  target:
    - target: tar.gz
      arch:
        - x64
  category: Utility
  artifactName: "${productName}-${version}-Linux.${ext}"

asar: true

extraResources:
  - from: resources/tray-icon.png
    to: tray-icon.png
  - from: resources/icon.ico
    to: icon.ico

extraMetadata:
  main: ./out/main/index.js
